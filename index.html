<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- পেজ টাইটেল এবং SEO মেটা ট্যাগ -->
    <title>MIX BOX - সেরা অনলাইন শপিং অভিজ্ঞতা</title>
    <meta name="description" content="MIX BOX - বাংলাদেশের অন্যতম সেরা অনলাইন শপিং মল। সাশ্রয়ী মূল্যে সেরা মানের পণ্য, দ্রুত ডেলিভারি এবং সহজ কেনাকাটার অভিজ্ঞতা।">
    <meta name="keywords" content="MIX BOX, মিক্স বক্স, অনলাইন শপিং, ই-কমার্স, বাংলাদেশ, শপিং মল, সেরা পণ্য, কম দাম">
    
    <!-- PWA এবং অ্যাপ আইকন সেটআপ -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* আইফ্রেম স্টাইল */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #ffffff;
        }

        /* লোডার কন্টেইনার */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        /* লোগো অ্যানিমেশন - নরম এবং মার্জিত */
        .brand-logo {
            width: 100px; /* সাইজ একটু ছোট করা হয়েছে প্রোফেশনাল লুকের জন্য */
            height: auto;
            margin-bottom: 40px;
            animation: soft-pulse 2.5s infinite ease-in-out;
        }

        @keyframes soft-pulse {
            0% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.85; }
        }

        /* ==========================================
           নতুন প্রফেশনাল ডটস এনিমেশন (টেক্সট ছাড়া)
           ========================================== */
        .loading-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* বিন্দুর মাঝে দূরত্ব */
        }

        .dot {
            width: 14px;
            height: 14px;
            background-color: #ff0055; /* আপনার ব্র্যান্ড কালার (Pink) */
            border-radius: 50%;
            animation: bounce-scale 1.4s infinite ease-in-out both;
        }

        /* দ্বিতীয় এবং তৃতীয় বিন্দুর জন্য ডিলে */
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce-scale {
            0%, 80%, 100% { 
                transform: scale(0); /* ছোট হয়ে যাওয়া */
                opacity: 0.5;
            } 
            40% { 
                transform: scale(1); /* বড় হওয়া */
                opacity: 1;
            } 
        }
        /* ========================================== */

        /* SEO Hidden Text Style */
        .seo-hidden-text {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <!-- লোডার সেকশন -->
    <div id="loader-container">
        <img id="loader-logo" src="" alt="Logo" class="brand-logo">
        
        <!-- প্রফেশনাল এনিমেশন (টেক্সট ছাড়া) -->
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- আইফ্রেম -->
    <iframe 
        id="shopFrame"
        allow="camera; microphone; geolocation; payment"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals">
    </iframe>

    <!-- SEO Hidden Text -->
    <div class="seo-hidden-text">
        <h1>MIX BOX (মিক্স বক্স) - বিশ্বস্ত ই-কমার্স ওয়েবসাইট</h1>
        <p>MIX BOX-এ আপনাকে স্বাগত! এটি বাংলাদেশের অন্যতম জনপ্রিয় একটি অনলাইন শপ।</p>
        <h2>আমাদের ক্যাটাগরি এবং কেনাকাটা</h2>
        <ul>
            <li>সেরা মানের পণ্যের নিশ্চয়তা।</li>
            <li>দ্রুত ডেলিভারি এবং নিরাপদ পেমেন্ট।</li>
        </ul>
    </div>

    <script>
        // ============================================================
        // কনফিগারেশন সেকশন
        // ============================================================
        const CONFIG = {
            deploymentUrl: "https://script.google.com/macros/s/AKfycbyoKYFQlUmqF9dUKhra1IFMJmyDh237ZTD9HQ5B8dMb3fZYjxpO63HsAic4RvMP-4_X/exec",
            logoUrl: "https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2",
            appName: "MIX BOX",
            version: "2.1"
        };

        // ============================================================
        // মেইন লজিক
        // ============================================================
        document.title = CONFIG.appName;
        document.getElementById('loader-logo').src = CONFIG.logoUrl;
        
        const iframe = document.getElementById('shopFrame');
        const loader = document.getElementById('loader-container');

        function loadApp() {
            const cacheBusterUrl = `${CONFIG.deploymentUrl}?v=${CONFIG.version}&t=${Date.now()}`;
            iframe.src = cacheBusterUrl;
        }

        iframe.onload = function() {
            // এনিমেশনটি সুন্দরভাবে শেষ হওয়ার জন্য একটু ডিলে
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                }, 600);
            }, 300); 
        };

        loadApp();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('Service Worker Registered');
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
