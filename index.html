<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ============================================================
         CACHING প্রতিরোধের জন্য মেটা ট্যাগ (Wrapper HTML এর জন্য)
         ============================================================ -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- পেজ টাইটেল এবং SEO মেটা ট্যাগ -->
    <title>MIX BOX - সেরা অনলাইন শপিং অভিজ্ঞতা</title>
    <meta name="description" content="MIX BOX - বাংলাদেশের অন্যতম সেরা অনলাইন শপিং মল। সাশ্রয়ী মূল্যে সেরা মানের পণ্য।">
    <meta name="keywords" content="MIX BOX, মিক্স বক্স, অনলাইন শপিং, ই-কমার্স">
    
    <!-- PWA এবং অ্যাপ আইকন সেটআপ -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* আইফ্রেম স্টাইল */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #ffffff;
        }

        /* লোডার কন্টেইনার */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        /* লোগো অ্যানিমেশন */
        .brand-logo {
            width: 100px;
            height: auto;
            margin-bottom: 40px;
            animation: soft-pulse 2.5s infinite ease-in-out;
        }

        @keyframes soft-pulse {
            0% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.85; }
        }

        /* লোডিং ডটস এনিমেশন */
        .loading-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background-color: #ff0055;
            border-radius: 50%;
            animation: bounce-scale 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce-scale {
            0%, 80%, 100% { 
                transform: scale(0); 
                opacity: 0.5;
            } 
            40% { 
                transform: scale(1); 
                opacity: 1;
            } 
        }

        /* SEO Hidden Text */
        .seo-hidden-text {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <!-- লোডার সেকশন -->
    <div id="loader-container">
        <img id="loader-logo" src="" alt="Logo" class="brand-logo">
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- আইফ্রেম -->
    <iframe 
        id="shopFrame"
        allow="camera; microphone; geolocation; payment"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals">
    </iframe>

    <!-- SEO Hidden Text -->
    <div class="seo-hidden-text">
        <h1>MIX BOX (মিক্স বক্স) - বিশ্বস্ত ই-কমার্স ওয়েবসাইট</h1>
        <p>MIX BOX-এ আপনাকে স্বাগত! এটি বাংলাদেশের অন্যতম জনপ্রিয় একটি অনলাইন শপ।</p>
    </div>

    <script>
        // ============================================================
        // কনফিগারেশন সেকশন
        // ============================================================
        const CONFIG = {
            // নতুন ডিপ্লয় করলে ভার্সন বাড়াবেন (যেমন: 2.3)
            deploymentUrl: "https://script.google.com/macros/s/AKfycbzCm0r1T2F4D3wyjIFK2GHjG0OQ3XBAqkHKNr_zm9J1t4r1lwJg8R7_G4idpKdVO6TV/exec",
            logoUrl: "https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2",
            appName: "MIX BOX",
            version: "2.3" 
        };

        document.title = CONFIG.appName;
        document.getElementById('loader-logo').src = CONFIG.logoUrl;
        
        const iframe = document.getElementById('shopFrame');
        const loader = document.getElementById('loader-container');
        const urlParams = new URLSearchParams(window.location.search);
        const urlVersion = urlParams.get('v');

        // ============================================================
        // স্মার্ট ভার্সন চেক এবং লিংক ক্লিনিং লজিক
        // ============================================================
        
        // ১. আগের সেভ করা ভার্সন চেক করা (LocalStorage থেকে)
        const savedVersion = localStorage.getItem('mixbox_version');
        const needsUpdate = (savedVersion !== CONFIG.version);

        // ২. যদি আপডেট প্রয়োজন হয় এবং বর্তমানে ভার্সন প্যারামিটার না থাকে
        if (needsUpdate && !urlVersion) {
            // তবে একবার রিডাইরেক্ট করে নতুন ক্যাশ লোড করতে হবে
            window.location.replace(window.location.origin + window.location.pathname + '?v=' + CONFIG.version);
        }
        // ৩. যদি ইতিমধ্যে ভার্সন প্যারামিটার থাকে (রিডাইরেক্ট হয়েছে)
        else if (urlVersion) {
            // লোকাল স্টোরেজে নতুন ভার্সন সেভ করুন
            localStorage.setItem('mixbox_version', CONFIG.version);
            
            // ব্যবহারকারীর চোখের আড়ালে লিংকটি পরিষ্কার করে ফেলুন (?v=2.2 রিমুভ করুন)
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // ============================================================
        // Service Worker লজিক
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // নতুন SW এলে সাথে সাথে রিফ্রেশ
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(err => console.log('SW Registration Failed', err));
        }

        // ============================================================
        // আইফ্রেম লোড ফাংশন
        // ============================================================
        function loadApp() {
            // ইউআরএল থেকে ভার্সন নিন, না থাকলে কনফিগ ভার্সন নিন
            const currentVersion = urlVersion || CONFIG.version;
            
            // ক্যাশ বাস্টার URL (শুধুমাত্র ভার্সন ব্যবহার করা হচ্ছে)
            const cacheBusterUrl = `${CONFIG.deploymentUrl}?v=${currentVersion}`;
            iframe.src = cacheBusterUrl;
        }

        iframe.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                }, 600);
            }, 300); 
        };

        loadApp();
    </script>
</body>
</html>
