<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- ==========================================
         CACHING প্রতিরোধের জন্য মেটা ট্যাগ
         এটি শুধুমাত্র index.html ফাইলটিকে নতুন রাখবে, আইফ্রেমের ক্যাশ ডিলিট করবে না।
         ========================================== -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>MIX BOX - সেরা অনলাইন শপিং অভিজ্ঞতা</title>
    <meta name="description" content="MIX BOX - বাংলাদেশের অন্যতম সেরা অনলাইন শপিং মল।">
    <meta name="keywords" content="MIX BOX, মিক্স বক্স, অনলাইন শপিং, ই-কমার্স">
    
    <!-- PWA এবং অ্যাপ আইকন সেটআপ -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="manifest" href="manifest.json">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #ffffff;
        }

        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        .brand-logo {
            width: 100px;
            height: auto;
            margin-bottom: 40px;
            animation: soft-pulse 2.5s infinite ease-in-out;
        }

        @keyframes soft-pulse {
            0% { transform: scale(1); opacity: 0.85; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.85; }
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 14px;
            height: 14px;
            background-color: #ff0055;
            border-radius: 50%;
            animation: bounce-scale 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce-scale {
            0%, 80%, 100% { 
                transform: scale(0); 
                opacity: 0.5;
            } 
            40% { 
                transform: scale(1); 
                opacity: 1;
            } 
        }

        .seo-hidden-text {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <img id="loader-logo" src="" alt="Logo" class="brand-logo">
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <iframe 
        id="shopFrame"
        allow="camera; microphone; geolocation; payment"
        sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals">
    </iframe>

    <div class="seo-hidden-text">
        <h1>MIX BOX (মিক্স বক্স) - বিশ্বস্ত ই-কমার্স ওয়েবসাইট</h1>
        <p>MIX BOX-এ আপনাকে স্বাগত!</p>
    </div>

    <script>
        // ============================================================
        // কনফিগারেশন সেকশন
        // ============================================================
        const CONFIG = {
            deploymentUrl: "https://script.google.com/macros/s/AKfycbzHC5d358QiZ_SLaLQycrBI6N2E-TctYKykOK3pTwU3S2hfRgrkFF4AIWZSdn_vGAHv/exec",
            logoUrl: "https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2",
            appName: "MIX BOX",
            // নতুন ডিপ্লয় করার সময় এই ভার্সন পরিবর্তন করবেন (যেমন: 2.2 থেকে 2.3)
            // এটি না পরিবর্তন করলে ব্রাউজার পুরোনো ভার্সন ক্যাশ থেকে দেখাবে (স্পিড বাড়ানোর জন্য)
            version: "1.1" 
        };

        // ============================================================
        // মেইন লজিক
        // ============================================================
        document.title = CONFIG.appName;
        document.getElementById('loader-logo').src = CONFIG.logoUrl;
        
        const iframe = document.getElementById('shopFrame');
        const loader = document.getElementById('loader-container');

        function loadApp() {
            // গুরুত্বপূর্ণ: এখানে Date.now() ব্যবহার করা হয়নি।
            // শুধুমাত্র 'version' প্যারামিটার ব্যবহার করা হয়েছে।
            // ফলে: v=2.2 থাকলে ক্যাশ থাকবে, v=2.3 করলে নতুন লোড হবে।
            const cacheBusterUrl = `${CONFIG.deploymentUrl}?v=${CONFIG.version}`;
            iframe.src = cacheBusterUrl;
        }

        iframe.onload = function() {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                }, 600);
            }, 300); 
        };

        loadApp();

        // Service Worker Setup
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('Service Worker Registered');
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        });
                    });
                })
                .catch(err => console.log('SW Registration Failed', err));
            });
        }
    </script>
</body>
</html>
